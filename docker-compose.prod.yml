# Produção: banco + API + web atrás do Caddy.
# Uso: ./deploy/instalar.sh  (gera o .env e sobe tudo)
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hallax
      POSTGRES_PASSWORD: ${DB_SENHA:?rode ./deploy/instalar.sh para gerar o .env}
      POSTGRES_DB: hallaxos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hallax -d hallaxos"]
      interval: 3s
      timeout: 3s
      retries: 30

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://hallax:${DB_SENHA}@db:5432/hallaxos
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_SENHA: ${ADMIN_SENHA:-}
      # Copiloto de IA (Sprint 9): vazio = desligado. Defina IA_API_KEY no .env para ativar.
      IA_API_KEY: ${IA_API_KEY:-}
      IA_MODELO: ${IA_MODELO:-claude-opus-4-8}
    volumes:
      - arquivos:/app/apps/api/dados
    depends_on:
      db:
        condition: service_healthy

  # Backup automático do Postgres: dump diário comprimido com retenção.
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_SENHA}
      BACKUP_INTERVALO_SEG: ${BACKUP_INTERVALO_SEG:-86400}
      BACKUP_RETENCAO: ${BACKUP_RETENCAO:-7}
    volumes:
      - backups:/backups
      - ./deploy/backup.sh:/backup.sh:ro
    entrypoint: ["sh", "/backup.sh"]
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      # Sem domínio (acesso por IP), cai em :80 — o Caddy não aceita endereço vazio.
      DOMINIO: ${DOMINIO:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_dados:/data
    depends_on:
      - api

volumes:
  pgdata:
  caddy_dados:
  arquivos:
  backups:
