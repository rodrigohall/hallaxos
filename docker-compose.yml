services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hallax
      POSTGRES_PASSWORD: hallax
      POSTGRES_DB: hallaxos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hallax -d hallaxos"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  pgdata:
