# Deploy automático no VPS a cada push.
# Configuração única (no GitHub → Settings → Secrets and variables → Actions):
#   VPS_HOST     → IP ou domínio do servidor
#   VPS_USER     → usuário SSH (ex.: root)
#   VPS_SSH_KEY  → chave privada com acesso ao servidor
# O código vai do runner para o VPS via rsync — o VPS não precisa de acesso ao GitHub.
name: Deploy VPS

on:
  push:
    branches: [claude/stoic-shannon-d3fxpi]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  # Porta de qualidade: nada quebrado chega ao VPS. Typecheck, build e testes.
  verificar:
    runs-on: ubuntu-latest
    # Postgres real para a suíte: typecheck/build não pegam erro de SQL cru
    # (ex.: referência inválida ao FROM quando a tabela está aliasada), que só
    # estoura em runtime — foi assim que a lista de Manutenções quebrou.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hallax
          POSTGRES_PASSWORD: hallax
          POSTGRES_DB: hallaxos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hallax -d hallaxos"
          --health-interval 2s --health-timeout 2s --health-retries 30
    env:
      DATABASE_URL: postgres://hallax:hallax@localhost:5432/hallaxos
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck e build
        run: |
          pnpm --filter @hallaxos/api typecheck
          pnpm --filter @hallaxos/web build
      - name: Aplicar migrations (schema para os testes de integração)
        run: pnpm db:migrate
      - name: Testes
        run: pnpm --filter @hallaxos/api test

  deploy:
    needs: verificar
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ATIVO != 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Preparar chave SSH
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ] || [ -z "${{ secrets.VPS_USER }}" ] || [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "::error::Segredos VPS_HOST, VPS_USER e VPS_SSH_KEY precisam estar configurados em Settings → Secrets → Actions."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          PORTA="${{ vars.VPS_PORT || '22' }}"
          echo "porta=$PORTA" >> "$GITHUB_OUTPUT"
          # ssh-keyscan é só best-effort: se a host key vier, ótimo; se não,
          # a conexão real fixa com accept-new. NÃO abortamos aqui — o keyscan
          # é flaky e não deve derrubar o deploy (regressão do Sprint 3).
          ssh-keyscan -p "$PORTA" -T 10 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
        id: ssh

      - name: Enviar código para o VPS
        run: |
          PORTA="${{ steps.ssh.outputs.porta }}"
          SSH="ssh -i ~/.ssh/id_deploy -p $PORTA -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=15"
          # Até 4 tentativas com backoff — absorve a instabilidade intermitente da rede do VPS
          n=0
          until rsync -az --delete \
            --exclude '.git' --exclude '.env' --exclude 'node_modules' \
            --exclude 'dados' --exclude 'dist' \
            -e "$SSH" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/hallaxos/"; do
            n=$((n+1))
            if [ $n -ge 4 ]; then
              echo "::error::Não consegui enviar ao VPS após 4 tentativas. Verifique se o SSH (porta $PORTA) está acessível: sshd ativo, firewall liberando a porta, sem fail2ban bloqueando os runners."
              exit 1
            fi
            echo "Tentativa $n falhou; aguardando $((n*10))s…"; sleep $((n*10))
          done

      - name: Executar instalador
        run: |
          PORTA="${{ steps.ssh.outputs.porta }}"
          ssh -i ~/.ssh/id_deploy -p "$PORTA" \
            -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=15 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd ~/hallaxos && DOMINIO='${{ vars.DOMINIO }}' ./deploy/instalar.sh"
