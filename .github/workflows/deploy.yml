# Deploy automático no VPS a cada push.
# Configuração única (no GitHub → Settings → Secrets and variables → Actions):
#   VPS_HOST     → IP ou domínio do servidor
#   VPS_USER     → usuário SSH (ex.: root)
#   VPS_SSH_KEY  → chave privada com acesso ao servidor
# O código vai do runner para o VPS via rsync — o VPS não precisa de acesso ao GitHub.
name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  # Porta de qualidade: nada quebrado chega ao VPS. Typecheck, build e testes.
  verificar:
    runs-on: ubuntu-latest
    # Postgres real para a suíte: typecheck/build não pegam erro de SQL cru
    # (ex.: referência inválida ao FROM quando a tabela está aliasada), que só
    # estoura em runtime — foi assim que a lista de Manutenções quebrou.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hallax
          POSTGRES_PASSWORD: hallax
          POSTGRES_DB: hallaxos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hallax -d hallaxos"
          --health-interval 2s --health-timeout 2s --health-retries 30
    env:
      DATABASE_URL: postgres://hallax:hallax@localhost:5432/hallaxos
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck e build
        run: |
          pnpm --filter @hallaxos/api typecheck
          pnpm --filter @hallaxos/web build
      - name: Aplicar migrations (schema para os testes de integração)
        run: pnpm db:migrate
      - name: Testes
        run: pnpm --filter @hallaxos/api test

  deploy:
    needs: verificar
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ATIVO != 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Histórico raso mas suficiente para o `git log -15` do estado.txt.
          fetch-depth: 15

      # estado.txt: fonte de verdade externa do estado deployado, servida em
      # http://<host>/estado.txt. Existe porque o cache do GitHub (raw/blobs)
      # devolve versões velhas a consultas externas e quebra a retomada de
      # sessões. Gerado aqui e enviado junto no rsync; o build do Vite copia
      # apps/web/public/ para dist/, que o Caddy serve como estático (/srv).
      # Conteúdo 100% público: commit, data, branch, sprint e git log — nada
      # de dado de negócio.
      - name: Gerar estado.txt
        run: |
          SHA_CURTO="$(echo '${{ github.sha }}' | cut -c1-7)"
          SPRINT="$(sed -n 's/^## Sprint \([0-9][0-9]*\).*/\1/p' CHANGELOG.md | head -1)"
          {
            echo "commit: $SHA_CURTO"
            echo "data_deploy: $(TZ=America/Campo_Grande date +%Y-%m-%dT%H:%M:%S%z)"
            echo "branch: main"
            echo "sprint_atual: ${SPRINT:-desconhecido}"
            echo "ultimos_commits:"
            git log --oneline -15
          } > apps/web/public/estado.txt
          cat apps/web/public/estado.txt

      - name: Preparar chave SSH
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ] || [ -z "${{ secrets.VPS_USER }}" ] || [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "::error::Segredos VPS_HOST, VPS_USER e VPS_SSH_KEY precisam estar configurados em Settings → Secrets → Actions."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          PORTA="${{ vars.VPS_PORT || '22' }}"
          echo "porta=$PORTA" >> "$GITHUB_OUTPUT"
          # ssh-keyscan é só best-effort: se a host key vier, ótimo; se não,
          # a conexão real fixa com accept-new. NÃO abortamos aqui — o keyscan
          # é flaky e não deve derrubar o deploy (regressão do Sprint 3).
          ssh-keyscan -p "$PORTA" -T 10 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
        id: ssh

      - name: Enviar código para o VPS
        run: |
          PORTA="${{ steps.ssh.outputs.porta }}"
          SSH="ssh -i ~/.ssh/id_deploy -p $PORTA -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=15"
          # Até 4 tentativas com backoff — absorve a instabilidade intermitente da rede do VPS
          n=0
          until rsync -az --delete \
            --exclude '.git' --exclude '.env' --exclude 'node_modules' \
            --exclude 'dados' --exclude 'dist' \
            -e "$SSH" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/hallaxos/"; do
            n=$((n+1))
            if [ $n -ge 4 ]; then
              echo "::error::Não consegui enviar ao VPS após 4 tentativas. Verifique se o SSH (porta $PORTA) está acessível: sshd ativo, firewall liberando a porta, sem fail2ban bloqueando os runners."
              exit 1
            fi
            echo "Tentativa $n falhou; aguardando $((n*10))s…"; sleep $((n*10))
          done

      - name: Executar instalador
        env:
          # O secret só chega ao container porque o instalador grava IA_API_KEY no
          # .env do VPS (o compose lê o .env, não o secret do Actions). Mantido em
          # env do step para não aparecer no comando inline; o Actions mascara o
          # valor nos logs. Vazio = instalador não toca no .env (copiloto desligado).
          IA_API_KEY: ${{ secrets.IA_API_KEY }}
          IA_MODELO: ${{ vars.IA_MODELO }}
        run: |
          PORTA="${{ steps.ssh.outputs.porta }}"
          # O rsync exclui o .git, então o VPS não tem o SHA — passamos o do
          # runner para carimbar a imagem (vira /api/v1/versao) e bustar o cache.
          SHA_CURTO="$(echo '${{ github.sha }}' | cut -c1-7)"
          SSH="ssh -i ~/.ssh/id_deploy -p $PORTA -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=15"
          REMOTO="cd ~/hallaxos && HALLAX_SHA='$SHA_CURTO' DOMINIO='${{ vars.DOMINIO }}' IA_API_KEY='$IA_API_KEY' IA_MODELO='$IA_MODELO' ./deploy/instalar.sh"
          # Até 4 tentativas com backoff — o instalador é idempotente, então
          # reexecutar após um timeout SSH (rede do VPS instável) é seguro.
          n=0
          until $SSH "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "$REMOTO"; do
            n=$((n+1))
            if [ $n -ge 4 ]; then
              echo "::error::Instalador não rodou após 4 tentativas. SSH (porta $PORTA) instável: confira sshd ativo, firewall liberando a porta e fail2ban não banindo os runners (ver docs/operacao-vps.md §1)."
              exit 1
            fi
            echo "Tentativa $n falhou; aguardando $((n*10))s…"; sleep $((n*10))
          done

      # Fecho do ciclo: confere PELA URL PÚBLICA que o estado.txt já reflete o
      # commit recém-deployado (é a validação do CLAUDE.md, automatizada — o
      # runner testa de fora, como qualquer consulta externa faria).
      - name: Validar estado.txt publicado
        run: |
          SHA_CURTO="$(echo '${{ github.sha }}' | cut -c1-7)"
          for i in 1 2 3 4 5 6; do
            CONTEUDO="$(curl -fsS --max-time 15 "http://${{ secrets.VPS_HOST }}/estado.txt" 2>/dev/null || true)"
            if printf '%s' "$CONTEUDO" | grep -q "commit: $SHA_CURTO"; then
              echo "estado.txt OK — servindo o commit $SHA_CURTO:"
              printf '%s\n' "$CONTEUDO"
              exit 0
            fi
            echo "Aguardando o container web servir a versão nova ($i/6)…"; sleep 10
          done
          echo "::error::estado.txt público não reflete o commit $SHA_CURTO após o deploy — confira o container web e o Caddy."
          exit 1
